global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "api-gateway"
    static_configs:
      - targets: ["api-gateway:80"]

  - job_name: "user-service"
    static_configs:
      - targets: ["user-service:8081"]

  - job_name: "catalog-service"
    static_configs:
      - targets: ["catalog-service:8082"]

  - job_name: "subscription-service"
    static_configs:
      - targets: ["subscription-service:8083"]

  - job_name: "notification-service"
    static_configs:
      - targets: ["notification-service:8084"]
